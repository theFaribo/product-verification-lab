server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful

spring:
  application:
    name: product-verification-reactive

  r2dbc:
    url: r2dbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:product_verification}
    username: ${DB_USER:product_app}
    password: ${DB_PASSWORD:product_password}

    pool:
      enabled: true
      initial-size: 5
      max-size: 20
      max-acquire-time: 1s
      max-idle-time: 30m
      validation-query: SELECT 1

  # Flyway не умеет работать через R2DBC URL.
  # Для миграции ему передаётся отдельный JDBC URL.
  # Flyway использует JDBC только при старте приложения.
  flyway:
    enabled: true
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:product_verification}
    user: ${DB_USER:product_app}
    password: ${DB_PASSWORD:product_password}
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

  metrics:
    tags:
      application: ${spring.application.name}