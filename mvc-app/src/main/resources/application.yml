server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: product-verification-mvc

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:product_verification}
    username: ${DB_USER:product_app}
    password: ${DB_PASSWORD:product_password}

    hikari:
      minimum-idle: 5
      maximum-pool-size: 20 #Hibernate не должен самостоятельно изменять production-схему. Схемой управляет Flyway.
      connection-timeout: 1000
      validation-timeout: 500
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    open-in-view: false #Hibernate не должен самостоятельно изменять production-схему. Схемой управляет Flyway.

    hibernate:
      ddl-auto: validate #Hibernate не должен самостоятельно изменять production-схему. Схемой управляет Flyway.

    properties:
      hibernate:
        jdbc:
          time_zone: UTC
        format_sql: false
        generate_statistics: false

  flyway:
    enabled: true
    locations: classpath:db/migration

  jackson:
    default-property-inclusion: non_null
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include:
          - health
          - info
          - metrics
          - prometheus

  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized

  metrics:
    tags:
      application: ${spring.application.name}